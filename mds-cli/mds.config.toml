[package]
enabled = true
allow_raw_source = false

[roots]
source = "../.build/rust/mds-cli"
types = "../.build/rust/mds-cli"
test = "../.build/rust/mds-cli"
excludes = []

[quality.rs]
linter = "cargo clippy -- -D warnings"
fixer = "cargo fmt"
test_runner = "cargo test"
required = ["rustc", "cargo", "rustfmt"]
optional = ["clippy-driver"]
