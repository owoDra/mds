services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        NODE_MAJOR: ${NODE_MAJOR:-22}
        RUST_VERSION: ${RUST_VERSION:-stable}
        CODEX_VERSION: ${CODEX_VERSION:-latest}
    image: ${COMPOSE_PROJECT_NAME:-monorepo}-codex-devcontainer:local
    working_dir: /workspace
    init: true
    command: sleep infinity
    network_mode: host
    environment:
      TZ: ${TZ:-Asia/Tokyo}
      COMPOSE_FILE: /workspace/.devcontainer/compose.yml
      CODEX_HOME: /root/.codex
      PATH: /usr/local/cargo/bin:/usr/local/bin:${PATH}
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.ssh:/home/vscode/.ssh:ro
      - codex-home:/root/.codex
      - user-local:/home/vscode/.local
      - user-cache:/home/vscode/.cache
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  codex-home:
  user-local:
  user-cache:
