# mds release quality manifest (alpha template)
#
# This file defines the artifacts, checksums, and supply-chain metadata
# required by `mds release check` before publishing.
#
# See: docs/project/specs/shared/SPEC-release-prepublish-quality.md

[release]
version = "0.1.0-alpha.1"
channel = "alpha"

# --- Cargo crates ---

[[artifacts]]
name = "mds-core"
channel = "alpha"
path = "crates/target/package/mds-core-0.1.0-alpha.1.crate"
checksum = ""          # SHA-256 of the .crate file (fill at release time)
signature = ""         # path to signature artifact (fill at release time)
sbom = ""              # path to SPDX or CycloneDX JSON (fill at release time)
provenance = ""        # path to provenance JSON (fill at release time)
smoke = "cargo install --path crates/mds-core && echo ok"

[[artifacts]]
name = "mds-cli"
channel = "alpha"
path = "crates/target/package/mds-cli-0.1.0-alpha.1.crate"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "cargo install --path crates/mds-cli && mds --version"

[[artifacts]]
name = "mds-lang-rs"
channel = "alpha"
path = "crates/target/package/mds-lang-rs-0.1.0-alpha.1.crate"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "cargo install --path crates/mds-lang-rs && echo ok"

[[artifacts]]
name = "mds-lsp"
channel = "alpha"
path = "crates/target/package/mds-lsp-0.1.0-alpha.1.crate"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "cargo install --path crates/mds-lsp && mds-lsp --version 2>&1 || true"

# --- npm packages ---

[[artifacts]]
name = "@mds/cli"
channel = "alpha"
path = "packages/cli/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "npm pack --dry-run"

[[artifacts]]
name = "@mds/core"
channel = "alpha"
path = "packages/core/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "node --check packages/core/src/index.js"

[[artifacts]]
name = "@mds/lang-ts"
channel = "alpha"
path = "packages/lang-ts/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "node --check packages/lang-ts/src/index.js"

[[artifacts]]
name = "@mds/lang-py"
channel = "alpha"
path = "packages/lang-py/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "node --check packages/lang-py/src/index.js"

[[artifacts]]
name = "@mds/lang-rs"
channel = "alpha"
path = "packages/lang-rs/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "node --check packages/lang-rs/src/index.js"

# --- Python packages ---

[[artifacts]]
name = "mds-cli (Python)"
channel = "alpha"
path = "python/mds_cli/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "python3 -m py_compile python/mds_cli/mds_cli/__main__.py"

[[artifacts]]
name = "mds-lang-py"
channel = "alpha"
path = "python/mds_lang_py/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "python3 -m py_compile python/mds_lang_py/mds_lang_py/__init__.py"

# --- VS Code extension ---

[[artifacts]]
name = "mds-vscode"
channel = "alpha"
path = "editors/vscode/"
checksum = ""
signature = ""
sbom = ""
provenance = ""
smoke = "cd editors/vscode && npm run compile"
