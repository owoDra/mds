# mds release quality manifest
#
# This file defines the artifacts, checksums, and supply-chain metadata
# required by `mds release check` before publishing.
#
# See: mds/core/.mds/source/release_quality.rs.md and docs/project/tech-stack.md
#
# Usage:
#   ./.github/script/release-check.sh --manifest release.mds.toml --verbose
#
# Prerequisites:
#   cargo run -p mds-cli -- build --verbose && ./.github/script/sync-self-hosted-rust.sh && cd .build/rust && cargo build --release
#   ./.github/script/generate-release-artifacts.sh
#
# Cargo publish order (依存順):
#   1. mds-core       (依存なし)
#   2. crates.io index 更新を待つ (30秒以上)
#   3. cargo publish --dry-run -p mds-cli && cargo publish --dry-run -p mds-lsp
#      ↑ ここで mds-core が resolve できなければ中止
#   4. mds-cli        (mds-core に依存)
#   5. mds-lsp        (mds-core に依存)
#
# Note: mds-cli and mds-lsp require mds-core to be published on crates.io
# before their .crate files can be produced via `cargo package`.
# The CI workflow handles this sequential ordering automatically,
# including a dry-run verification step after mds-core is published.
#
# VS Code extension:
#   cd editors/vscode && npx @vscode/vsce package
#   npx @vscode/vsce publish --pre-release
#
# Full workflow:
#   1. cargo run -p mds-cli -- build --verbose && ./.github/script/sync-self-hosted-rust.sh && cd .build/rust && cargo build --release
#   2. ./.github/script/generate-release-artifacts.sh [--sign]
#   3. ./.github/script/release-check.sh --manifest release.mds.toml --verbose
#   4. Publish in order (CI handles automatically)

[release]
version = "0.1.0-alpha.1"
channel = "alpha"

# --- Cargo crates ---

[[artifacts]]
name = "mds-core"
channel = "alpha"
path = ".build/rust/target/package/mds-core-0.1.0-alpha.1.crate"
checksum = ".build/release/checksums/mds-core-0.1.0-alpha.1.sha256"
signature = ".build/release/signatures/mds-core-0.1.0-alpha.1.sig"
sbom = ".build/release/sbom/mds-core-0.1.0-alpha.1.spdx.json"
provenance = ".build/release/provenance/mds-core-0.1.0-alpha.1.jsonl"
smoke = true

[[artifacts]]
name = "mds-cli"
channel = "alpha"
path = ".build/rust/target/package/mds-cli-0.1.0-alpha.1.crate"
checksum = ".build/release/checksums/mds-cli-0.1.0-alpha.1.sha256"
signature = ".build/release/signatures/mds-cli-0.1.0-alpha.1.sig"
sbom = ".build/release/sbom/mds-cli-0.1.0-alpha.1.spdx.json"
provenance = ".build/release/provenance/mds-cli-0.1.0-alpha.1.jsonl"
smoke = true
requires_published = "mds-core"

[[artifacts]]
name = "mds-lsp"
channel = "alpha"
path = ".build/rust/target/package/mds-lsp-0.1.0-alpha.1.crate"
checksum = ".build/release/checksums/mds-lsp-0.1.0-alpha.1.sha256"
signature = ".build/release/signatures/mds-lsp-0.1.0-alpha.1.sig"
sbom = ".build/release/sbom/mds-lsp-0.1.0-alpha.1.spdx.json"
provenance = ".build/release/provenance/mds-lsp-0.1.0-alpha.1.jsonl"
smoke = true
requires_published = "mds-core"

# --- VS Code extension ---

[[artifacts]]
name = "owo-x-project.mds"
channel = "alpha"
path = ".build/node/vscode/"
checksum = ".build/release/checksums/mds-vscode-0.1.0.sha256"
signature = ".build/release/signatures/mds-vscode-0.1.0.sig"
sbom = ".build/release/sbom/mds-vscode-0.1.0.spdx.json"
provenance = ".build/release/provenance/mds-vscode-0.1.0.jsonl"
smoke = true
