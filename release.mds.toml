# mds release quality manifest
#
# This file defines the artifacts, checksums, and supply-chain metadata
# required by `mds release check` before publishing.
#
# See: mds/core/.mds/source/release_quality.rs.md and docs/project/tech-stack.md
#
# Usage:
#   ./.github/script/release-check.sh --manifest release.mds.toml --verbose
#
# Prerequisites:
#   cargo build --workspace --release
#   cargo package --allow-dirty --no-verify -p mds-core
#   mds-core must already be published on crates.io before mds-cli and
#   mds-lsp release artifacts can be generated.
#   ./.github/script/generate-release-artifacts.sh
#
# Cargo publish order (依存順):
#   1. mds-core       (依存なし)
#   2. crates.io index 更新を待つ (30秒以上)
#   3. cargo publish --dry-run -p mds-cli && cargo publish --dry-run -p mds-lsp
#      ↑ ここで mds-core が resolve できなければ中止
#   4. mds-cli        (mds-core に依存)
#   5. mds-lsp        (mds-core に依存)
#
# Note: release packaging reads `.crate` files from the root Cargo workspace
# under `target/package/`. mds-cli and mds-lsp still require mds-core to be
# published on crates.io before their `cargo package` step can succeed.
# The CI workflow handles this sequential ordering automatically,
# including a dry-run verification step after mds-core is published.
#
# VS Code extension:
#   cd editors/vscode && npx @vscode/vsce package
#   npx @vscode/vsce publish --pre-release
#
# Full workflow:
#   1. cargo build --workspace --release
#   2. cargo package --allow-dirty --no-verify -p mds-core
#   3. Publish mds-core and wait for crates.io index update
#   4. ./.github/script/generate-release-artifacts.sh [--sign]
#   5. ./.github/script/release-check.sh --manifest release.mds.toml --verbose
#   6. Publish remaining crates in order (CI handles automatically)

[release]
version = "0.2.1-alpha"
channel = "alpha"

# --- Cargo crates ---

[[artifacts]]
name = "mds-core"
channel = "alpha"
path = "target/package/mds-core-0.2.1-alpha.crate"
checksum = ".build/release/checksums/mds-core-0.2.1-alpha.sha256"
signature = ".build/release/signatures/mds-core-0.2.1-alpha.sig"
sbom = ".build/release/sbom/mds-core-0.2.1-alpha.spdx.json"
provenance = ".build/release/provenance/mds-core-0.2.1-alpha.jsonl"
smoke = true

[[artifacts]]
name = "mds-cli"
channel = "alpha"
path = "target/package/mds-cli-0.2.1-alpha.crate"
checksum = ".build/release/checksums/mds-cli-0.2.1-alpha.sha256"
signature = ".build/release/signatures/mds-cli-0.2.1-alpha.sig"
sbom = ".build/release/sbom/mds-cli-0.2.1-alpha.spdx.json"
provenance = ".build/release/provenance/mds-cli-0.2.1-alpha.jsonl"
smoke = true
requires_published = "mds-core"

[[artifacts]]
name = "mds-lsp"
channel = "alpha"
path = "target/package/mds-lsp-0.2.1-alpha.crate"
checksum = ".build/release/checksums/mds-lsp-0.2.1-alpha.sha256"
signature = ".build/release/signatures/mds-lsp-0.2.1-alpha.sig"
sbom = ".build/release/sbom/mds-lsp-0.2.1-alpha.spdx.json"
provenance = ".build/release/provenance/mds-lsp-0.2.1-alpha.jsonl"
smoke = true
requires_published = "mds-core"

# --- VS Code extension ---

[[artifacts]]
name = "owo-x-project.mds"
channel = "alpha"
path = ".build/node/vscode/"
checksum = ".build/release/checksums/mds-vscode-0.2.1-alpha.sha256"
signature = ".build/release/signatures/mds-vscode-0.2.1-alpha.sig"
sbom = ".build/release/sbom/mds-vscode-0.2.1-alpha.spdx.json"
provenance = ".build/release/provenance/mds-vscode-0.2.1-alpha.jsonl"
smoke = true
