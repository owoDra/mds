# mds release quality manifest (alpha template)
#
# This file defines the artifacts, checksums, and supply-chain metadata
# required by `mds release check` before publishing.
#
# See: docs/project/specs/shared/SPEC-release-prepublish-quality.md
#
# Usage:
#   mds release check --manifest release.mds.toml
#
# Cargo publish order (依存順):
#   1. mds-core       (依存なし)
#   2. mds-lang-rs    (依存なし)
#   3. mds-cli        (mds-core に依存)
#   4. mds-lsp        (mds-core に依存)
#
# npm publish (--tag alpha):
#   npm publish --workspace cli --tag alpha
#   npm publish --workspace core --tag alpha
#   npm publish --workspace lang-ts --tag alpha
#   npm publish --workspace lang-py --tag alpha
#   npm publish --workspace lang-rs --tag alpha
#
# Workflow:
#   1. cargo build --release && cargo package --allow-dirty
#   2. Run generate-release-artifacts.sh (後続タスクで作成)
#      → checksums/, signatures/, sbom/, provenance/ に出力
#   3. Install smoke test を実行し、各 smoke = true を確認
#   4. mds release check --manifest release.mds.toml

[release]
version = "0.1.0-alpha.1"
channel = "alpha"

# --- Cargo crates ---

[[artifacts]]
name = "mds-core"
channel = "alpha"
path = "crates/target/package/mds-core-0.1.0-alpha.1.crate"
checksum = "checksums/mds-core-0.1.0-alpha.1.sha256"
signature = "signatures/mds-core-0.1.0-alpha.1.sig"
sbom = "sbom/mds-core-0.1.0-alpha.1.spdx.json"
provenance = "provenance/mds-core-0.1.0-alpha.1.jsonl"
smoke = true

