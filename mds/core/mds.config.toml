[package]
enabled = true
allow_raw_source = false

[roots]
source_md = ".mds/source"
test_md = ".mds/test"
source_out = "src"
test_out = "tests"

[check]
top_level_fence_required = false

[quality.rs]
linter = "cargo clippy -- -D warnings"
fixer = "cargo fmt"
test_runner = "cargo test --test parser_generation_mvp_test -- --test-threads=1"
required = ["rustc", "cargo", "rustfmt"]
optional = ["clippy-driver"]
