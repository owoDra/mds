id = "flutter"
match_suffixes = ["flutter"]

[language]
primary_ext = "dart"

[files.source]
strip_lang_ext = true
prefix = ""
suffix = ""
extension = "dart"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "dart"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = "_test"
extension = "dart"

[syntax]
top_level_keywords = ["class ", "enum ", "Widget ", "StatefulWidget", "StatelessWidget", "final ", "const "]
comment_prefixes = ["//", "/*", "*"]
doc_comment_prefixes = ["///", "/**"]

[[syntax.imports]]
starts_with = "import "

[scaffold]
fence_lang = "dart"
source_body = '''
import 'package:flutter/widgets.dart';

class FeatureWidget extends StatelessWidget {
  const FeatureWidget({super.key});

  @override
  Widget build(BuildContext context) {
    return const SizedBox.shrink();
  }
}
'''