id = "cpp"
aliases = ["c++", "cplusplus", "cc", "cxx"]
match_suffixes = ["cpp", "cc", "cxx"]

[language]
primary_ext = "cpp"

[files.source]
strip_lang_ext = false
prefix = ""
suffix = ""
extension = "cpp"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "hpp"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = ".test"
extension = "cpp"

[syntax]
top_level_keywords = ["class ", "struct ", "enum ", "template<", "namespace ", "constexpr ", "inline "]
comment_prefixes = ["//", "/*", "*"]
doc_comment_prefixes = ["///", "/**"]

[[syntax.imports]]
starts_with = "#include "

[scaffold]
fence_lang = "matched-suffix"
source_body = '''
// Implement your feature here.
'''