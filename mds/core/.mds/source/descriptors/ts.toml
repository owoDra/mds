id = "ts"
aliases = ["typescript"]
match_suffixes = ["ts"]

[language]
primary_ext = "ts"

[files.source]
strip_lang_ext = false
prefix = ""
suffix = ""
extension = "ts"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "ts"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = ".test"
extension = "ts"

[imports]
style = "typescript"
allow_default = true
allow_namespace = true
allow_alias = true
allow_type_only = true

[quality_defaults]
lint = "eslint"
fix = "prettier --write"
test = "vitest run"

[tool_profiles.lint.eslint]
command = "eslint"
required = ["node", "eslint"]

[tool_profiles.lint.biome]
command = "biome lint"
required = ["node", "biome"]

[tool_profiles.fix.prettier]
command = "prettier --write"
required = ["node", "prettier"]

[tool_profiles.fix.biome]
command = "biome format --write"
required = ["node", "biome"]

[tool_profiles.test.vitest]
command = "vitest run"
required = ["node", "vitest"]

[tool_profiles.test.jest]
command = "jest"
required = ["node", "jest"]

[syntax]
top_level_keywords = [
	"export function ",
	"function ",
	"export class ",
	"class ",
	"export interface ",
	"interface ",
	"export type ",
	"type ",
	"export const ",
	"const ",
	"export let ",
	"let ",
	"export enum ",
	"enum ",
]
comment_prefixes = ["//", "/*", "*"]

[[syntax.imports]]
starts_with = "import "

[[syntax.imports]]
starts_with = "export "
contains = [" from "]

[[syntax.imports]]
starts_with = "const "
contains = ["require("]

[[syntax.imports]]
starts_with = "let "
contains = ["require("]

[[syntax.imports]]
starts_with = "var "
contains = ["require("]

[scaffold]
fence_lang = "matched-suffix"
source_body = '''
// Implement your feature here.
'''

[tooling.lint]
input = "stdin"
append_file_arg = true

[[tooling.lint.diagnostics]]
pattern = '^(?P<path>.+?):(?P<line>\d+):(?P<column>\d+): (?P<message>.+)$'

[tooling.fix]
input = "tempfile"
output = "tempfile"
append_file_arg = true

[tooling.test]
input = "stdin"
append_file_arg = true

[[tooling.test.diagnostics]]
pattern = '^(?P<path>.+?):(?P<line>\d+):(?P<column>\d+): (?P<message>.+)$'