id = "angular"
aliases = ["ng"]
match_suffixes = ["angular"]

[language]
primary_ext = "ts"

[files.source]
strip_lang_ext = true
prefix = ""
suffix = ""
extension = "ts"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "ts"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = ".test"
extension = "ts"

[syntax]
top_level_keywords = [
  "export class ",
  "class ",
  "export interface ",
  "interface ",
  "export const ",
  "const ",
]
comment_prefixes = ["//", "/*", "*"]

[[syntax.imports]]
starts_with = "import "

[scaffold]
fence_lang = "ts"
source_body = '''
// Implement your Angular feature here.
'''