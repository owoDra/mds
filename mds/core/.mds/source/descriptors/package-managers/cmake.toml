id = "cmake"
display_name = "CMake"
lang = "cpp"
metadata_files = ["CMakeLists.txt"]
lockfiles = ["CMakePresets.json"]
metadata_reader = "cmake-text"

[commands]
install = "cmake -S . -B build"
build = "cmake --build build"
typecheck = "cmake --build build"
lint = "clang-tidy"
test = "ctest --test-dir build"