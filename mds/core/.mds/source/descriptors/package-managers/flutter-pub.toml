id = "flutter-pub"
aliases = ["flutter"]
display_name = "Flutter (pub)"
lang = "flutter"
metadata_files = ["pubspec.yaml"]
lockfiles = ["pubspec.lock"]
metadata_reader = "pubspec-yaml"

[commands]
install = "flutter pub get"
build = "flutter build"
typecheck = "flutter analyze"
lint = "flutter analyze"
test = "flutter test"