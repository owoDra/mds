id = "vue"
match_suffixes = ["vue"]

[language]
primary_ext = "vue"

[files.source]
strip_lang_ext = false
prefix = ""
suffix = ""
extension = "vue"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "ts"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = ".test"
extension = "ts"

[syntax]
top_level_keywords = ["<template>", "<script", "export default ", "defineProps(", "defineEmits("]
comment_prefixes = ["<!--", "//", "/*", "*"]

[[syntax.imports]]
starts_with = "import "

[scaffold]
fence_lang = "matched-suffix"
source_body = '''
<template>
  <div><!-- Implement your feature here. --></div>
</template>

<script setup lang="ts">
// Implement your feature here.
</script>
'''