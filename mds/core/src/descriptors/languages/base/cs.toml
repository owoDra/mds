id = "cs"
aliases = ["csharp", "c#", "dotnet"]
match_suffixes = ["cs"]

[language]
primary_ext = "cs"

[files.source]
strip_lang_ext = false
prefix = ""
suffix = ""
extension = "cs"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "cs"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = ".test"
extension = "cs"

[syntax]
top_level_keywords = ["public class ", "class ", "public interface ", "interface ", "public record ", "record ", "public enum ", "enum ", "public static ", "static "]
comment_prefixes = ["//", "/*", "*"]
doc_comment_prefixes = ["///", "/**"]

[[syntax.imports]]
starts_with = "using "

[scaffold]
fence_lang = "matched-suffix"
source_body = '''
// Implement your feature here.
'''