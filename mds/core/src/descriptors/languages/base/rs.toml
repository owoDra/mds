id = "rs"
aliases = ["rust"]
match_suffixes = ["rs"]

[language]
primary_ext = "rs"

[files.source]
strip_lang_ext = false
prefix = ""
suffix = ""
extension = "rs"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = "_types"
extension = "rs"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = "_test"
extension = "rs"

[[special_files]]
match = "build.rs.md"
kind = "source"
output = "build.rs"
root = "package"

[imports]
style = "rust"
allow_default = false
allow_namespace = false
allow_alias = true
allow_type_only = false

[quality_defaults]
lint = "cargo clippy"
fix = "cargo fmt"
test = "cargo test --lib"

[tool_profiles.lint.clippy]
command = "cargo clippy"
required = ["rustc", "cargo"]
optional = ["clippy-driver"]

[tool_profiles.fix.rustfmt]
command = "rustfmt"
required = ["rustfmt"]

[tool_profiles.test.cargo-test]
command = "cargo test --lib"
required = ["rustc", "cargo"]

[tool_profiles.test.nextest]
command = "cargo nextest run"
required = ["rustc", "cargo"]
optional = ["cargo-nextest"]

[syntax]
top_level_keywords = [
	"pub fn ",
	"fn ",
	"pub struct ",
	"struct ",
	"pub enum ",
	"enum ",
	"pub trait ",
	"trait ",
	"impl ",
	"pub type ",
	"type ",
	"pub const ",
	"const ",
	"pub static ",
	"static ",
	"pub mod ",
	"mod ",
]
comment_prefixes = ["//", "/*", "*"]
doc_comment_prefixes = ["///", "//!", "/**", "/*!"]

[[syntax.imports]]
starts_with = "use "

[[syntax.imports]]
starts_with = "extern crate "

[scaffold]
fence_lang = "matched-suffix"
source_body = '''
// Implement your feature here.
'''
