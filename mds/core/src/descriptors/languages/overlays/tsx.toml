id = "tsx"
match_suffixes = ["tsx"]

[language]
primary_ext = "tsx"

[files.source]
strip_lang_ext = false
prefix = ""
suffix = ""
extension = "tsx"

[files.types]
strip_lang_ext = true
prefix = ""
suffix = ".types"
extension = "tsx"

[files.test]
strip_lang_ext = true
prefix = ""
suffix = ".test"
extension = "tsx"

[imports]
style = "typescript"

[syntax]
top_level_keywords = [
  "export function ",
  "function ",
  "export const ",
  "const ",
  "export default ",
]
comment_prefixes = ["//", "/*", "*"]
doc_comment_prefixes = ["/**", "///"]

[[syntax.imports]]
starts_with = "import "

[[syntax.imports]]
starts_with = "export "
contains = [" from "]

[scaffold]
fence_lang = "matched-suffix"
source_body = '''
// Implement your feature here.
'''

[tooling.lint]
input = "stdin"
append_file_arg = true

[[tooling.lint.diagnostics]]
pattern = '^(?P<path>.+?):(?P<line>\d+):(?P<column>\d+): (?P<message>.+)$'

[tooling.fix]
input = "tempfile"
output = "tempfile"
append_file_arg = true

[tooling.test]
input = "stdin"
append_file_arg = true

[[tooling.test.diagnostics]]
pattern = '^(?P<path>.+?):(?P<line>\d+):(?P<column>\d+): (?P<message>.+)$'