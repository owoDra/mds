[package]
enabled = true
allow_raw_source = false

[roots]
source = "../.build/rust/mds-core"
types = "../.build/rust/mds-core"
test = "../.build/rust/mds-core"
excludes = [".mds/source/src/init/templates/**"]

[quality.rs]
linter = "cargo clippy -- -D warnings"
fixer = "cargo fmt"
test_runner = "cargo test"
required = ["rustc", "cargo", "rustfmt"]
optional = ["clippy-driver"]
