# Claude Code template manifest
# Each [[file]] entry maps a template file to its output path and category.

[[file]]
template = "rules.md"
output_path = ".claude/rules/mds.md"
category = "instructions"

[[file]]
template = "skill.md"
output_path = ".claude/skills/mds/SKILL.md"
category = "skills"

[[file]]
template = "command-check.md"
output_path = ".claude/commands/mds-check.md"
category = "commands"

[[file]]
template = "command-build.md"
output_path = ".claude/commands/mds-build.md"
category = "commands"

[[file]]
template = "command-lint.md"
output_path = ".claude/commands/mds-lint.md"
category = "commands"
