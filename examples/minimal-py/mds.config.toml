# Generated by mds init.
[package]
enabled = true
allow_raw_source = false

[roots]
source_md = ".mds/source"
test_md = ".mds/test"
source_out = "src"
test_out = "tests"

[output]
source = "{source_out}/{module}.{ext}"
test = "{test_out}/{module}.test.{ext}"

[[output.override]]
match = "*"
kind = "test"
path = "{test_out}/test_{module}.{ext}"

[quality.py]
linter = "ruff check"
fixer = "ruff format"
test_runner = ""
required = ["python3", "ruff", "pytest"]
optional = []
