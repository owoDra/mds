# Generated by mds init.
[package]
enabled = true
allow_raw_source = false

[roots]
source_md = ".mds/source"
test_md = ".mds/test"
source_out = "src"
test_out = "tests"

[output]
source = "{source_out}/{module}.{ext}"
test = "{test_out}/{module}.test.{ext}"

[quality.rs]
linter = "cargo clippy"
fixer = "rustfmt"
test_runner = "cargo test --lib"
required = ["rustc", "cargo", "rustfmt"]
optional = ["clippy-driver"]
