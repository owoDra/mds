# Release Workflow
#
# Performs the full release pipeline:
#   1. Quality gate (fmt + clippy + test + examples)
#   2. Build release binaries
#   3. Generate supply-chain artifacts & run release quality gate
#   4. Publish to registries (sequential, respecting dependency order)
#
# Trigger: manual dispatch only (workflow_dispatch)
# Supports: alpha, beta, stable channels via version input

name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publishing)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      version:
        description: 'Version to release (e.g. 0.1.0-alpha.1, 0.1.0-beta.1, 0.1.0)'
        required: true
        default: '0.1.0-alpha.1'
      channel:
        description: 'Release channel'
        required: true
        default: 'alpha'
        type: choice
        options:
          - 'alpha'
          - 'beta'
          - 'stable'

permissions:
  contents: read
  id-token: write  # For sigstore/provenance

env:
  CARGO_TERM_COLOR: always
  VERSION: ${{ inputs.version }}

jobs:
  # --- Quality Gate ---
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/Cargo.lock') }}

      - name: Format check
        run: cd crates && cargo fmt --check

      - name: Clippy
        run: cd crates && cargo clippy -- -D warnings

      - name: Test
        run: cd crates && cargo test

      - name: Examples smoke test
        run: |
          cd crates && cargo build
          cargo run -p mds-cli -- check --package ../examples/minimal-ts
          cargo run -p mds-cli -- check --package ../examples/minimal-py
          cargo run -p mds-cli -- check --package ../examples/minimal-rs

  # --- Build Release Binaries ---
  build:
    name: Build (${{ matrix.target }})
    needs: quality
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: |
          cd crates
          cargo build --release --target ${{ matrix.target }} -p mds-cli -p mds-lsp
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: |
            crates/target/${{ matrix.target }}/release/mds
            crates/target/${{ matrix.target }}/release/mds-lsp

  # --- Release Quality Gate (BEFORE publish) ---
  release-gate:
    name: Release Quality Gate
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('crates/Cargo.lock') }}

      - name: Build mds CLI
        run: cd crates && cargo build

      - name: Generate release artifacts
        run: ./scripts/generate-release-artifacts.sh

      - name: Run release check (from repo root)
        run: |
          crates/target/debug/mds release check --manifest release.mds.toml --verbose

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            .release/

  # --- Package & Publish Cargo Crates ---
  publish-cargo:
    name: Publish Cargo Crates
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish mds-core
        if: inputs.dry_run == 'false'
        run: cd crates && cargo publish -p mds-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish mds-lang-rs
        if: inputs.dry_run == 'false'
        run: cd crates && cargo publish -p mds-lang-rs
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        if: inputs.dry_run == 'false'
        run: sleep 30

      - name: Verify mds-cli and mds-lsp can resolve mds-core
        if: inputs.dry_run == 'false'
        run: |
          cd crates
          cargo publish --dry-run -p mds-cli
          cargo publish --dry-run -p mds-lsp

      - name: Publish mds-cli
        if: inputs.dry_run == 'false'
        run: cd crates && cargo publish -p mds-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish mds-lsp
        if: inputs.dry_run == 'false'
        run: cd crates && cargo publish -p mds-lsp
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Dry run - package verification
        if: inputs.dry_run == 'true'
        run: |
          cd crates
          cargo package --allow-dirty -p mds-core
          cargo package --allow-dirty -p mds-lang-rs
          echo "Note: mds-cli and mds-lsp require mds-core on crates.io for packaging"

  # --- Publish npm packages ---
  publish-npm:
    name: Publish npm Packages
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-gnu
          path: ./binaries

      - name: Vendor native binary
        run: |
          chmod +x ./binaries/mds
          node packages/scripts/vendor-binary.js --source ./binaries/mds

      - name: Check packages
        run: cd packages && npm run check:npm

      - name: Pack check
        run: cd packages && npm pack --workspaces --dry-run

      - name: Publish
        if: inputs.dry_run == 'false'
        run: cd packages && npm publish --workspaces --tag ${{ inputs.channel }} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # --- Publish Python packages ---
  publish-python:
    name: Publish Python Packages
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Download linux binary
        uses: actions/download-artifact@v4
        with:
          name: binaries-x86_64-unknown-linux-gnu
          path: ./binaries

      - name: Vendor native binary
        run: |
          chmod +x ./binaries/mds
          python3 python/scripts/vendor_binary.py --source ./binaries/mds

      - name: Build packages
        run: |
          cd python/mds_cli && uv build
          cd ../mds_lang_py && uv build

      - name: Publish
        if: inputs.dry_run == 'false'
        run: |
          cd python/mds_cli && uv publish
          cd ../mds_lang_py && uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}

  # --- Publish VS Code Extension ---
  publish-vscode:
    name: Publish VS Code Extension
    needs: release-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: cd editors/vscode && npm install

      - name: Compile
        run: cd editors/vscode && npm run compile

      - name: Package VSIX
        run: |
          cd editors/vscode
          if [[ "${{ inputs.channel }}" == "stable" ]]; then
            npx @vscode/vsce package
          else
            npx @vscode/vsce package --pre-release
          fi

      - name: Publish
        if: inputs.dry_run == 'false'
        run: |
          cd editors/vscode
          if [[ "${{ inputs.channel }}" == "stable" ]]; then
            npx @vscode/vsce publish
          else
            npx @vscode/vsce publish --pre-release
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
